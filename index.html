<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Digital Nations — Intelligence Platform</title>
  <script>window.CESIUM_BASE_URL = 'https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/';</script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>
  <style>
    :root { --cyan:#0bd3e6; --ink:#03090d; --glow:rgba(11,211,230,0.18); }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; background:var(--ink); overflow:hidden;
      font-family:"IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }

    /* Globe fills the viewport */
    #cesiumContainer { position:fixed; inset:0; z-index:1; }

    /* Suppress all Cesium UI chrome */
    .cesium-viewer-bottom, .cesium-viewer-animationContainer,
    .cesium-viewer-timelineContainer, .cesium-viewer-toolbar,
    .cesium-widget-credits, .cesium-infoBox, .cesium-selection-wrapper { display:none !important; }
    .cesium-widget canvas { image-rendering:auto; }

    /* Holographic grade overlay - pointer-transparent */
    #grade {
      position:fixed; inset:0; z-index:5; pointer-events:none;
      background:
        radial-gradient(ellipse 80% 70% at 50% 30%, rgba(11,211,230,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 100% 50% at 50% 100%, rgba(3,9,13,0.85) 0%, transparent 60%);
    }
    /* Subtle scanlines */
    #scan {
      position:fixed; inset:0; z-index:6; pointer-events:none; opacity:0.025;
      background:repeating-linear-gradient(0deg, #0bd3e6 0 1px, transparent 1px 4px);
    }

    /* HUD elements */
    .hud {
      position:fixed; z-index:10; pointer-events:none;
      color:#bfe7ee; font-size:11px; letter-spacing:0.18em;
      text-transform:uppercase; line-height:1.6;
    }
    .hud b { color:var(--cyan); font-weight:600; }
    .hud.tl { top:20px; left:22px; }
    .hud.tr { top:20px; right:22px; text-align:right; }
    .hud.bl { bottom:28px; left:22px; }

    /* Layer indicator - shows active data layer */
    #layer-indicator {
      position:fixed; bottom:28px; right:22px; z-index:10;
      display:flex; flex-direction:column; align-items:flex-end; gap:6px;
      pointer-events:none;
    }
    .layer-pill {
      display:flex; align-items:center; gap:8px;
      padding:5px 10px 5px 8px;
      border:1px solid rgba(11,211,230,0.2);
      border-radius:4px;
      font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
      color:#7fa6ae;
      transition: all 0.4s ease;
      opacity:0.4;
    }
    .layer-pill.active {
      border-color:rgba(11,211,230,0.5);
      color:var(--cyan);
      opacity:1;
      background:rgba(11,211,230,0.05);
    }
    .layer-dot { width:6px; height:6px; border-radius:50%; background:#7fa6ae; flex-shrink:0; }
    .layer-pill.active .layer-dot { background:var(--cyan); box-shadow:0 0 6px var(--cyan); }

    /* Altitude progress bar */
    #alt-bar {
      position:fixed; left:0; top:0; bottom:0; z-index:10; pointer-events:none;
      width:3px;
    }
    #alt-fill {
      position:absolute; bottom:0; left:0; right:0;
      background:linear-gradient(to top, var(--cyan), transparent);
      transition: height 0.2s ease;
      opacity:0.6;
    }

    /* Scroll hint */
    #scroll-hint {
      position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
      z-index:10; pointer-events:none;
      font-size:10px; letter-spacing:0.22em; text-transform:uppercase;
      color:rgba(11,211,230,0.5);
      display:flex; flex-direction:column; align-items:center; gap:6px;
      animation: fadeHint 1s ease 3s forwards;
      opacity:1;
    }
    .scroll-arrow {
      width:14px; height:14px;
      border-right:1px solid rgba(11,211,230,0.5);
      border-bottom:1px solid rgba(11,211,230,0.5);
      transform:rotate(45deg);
      animation:arrowBounce 1.4s ease-in-out infinite;
    }
    @keyframes arrowBounce { 0%,100%{transform:rotate(45deg) translateY(-3px)} 50%{transform:rotate(45deg) translateY(3px)} }
    @keyframes fadeHint { to { opacity:0; } }

    /* Loading state */
    #loading {
      position:fixed; inset:0; z-index:30; background:var(--ink);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; transition:opacity 0.8s ease;
    }
    #loading.gone { opacity:0; pointer-events:none; }
    .dn-logo { font-size:13px; letter-spacing:0.3em; color:#eaffff; text-transform:uppercase; }
    .dn-logo span { color:var(--cyan); }
    .loading-bar { width:180px; height:2px; background:rgba(11,211,230,0.15); border-radius:2px; overflow:hidden; }
    .loading-fill { height:100%; background:var(--cyan); width:0%; transition:width 0.4s ease; border-radius:2px; }
    .loading-status { font-size:10px; letter-spacing:0.18em; color:#4a7a82; text-transform:uppercase; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="grade"></div>
  <div id="scan"></div>

  <!-- HUD chrome -->
  <div class="hud tl">
    DIGITAL NATIONS<br/>
    <b id="mode-label">SPACE VIEW</b>
  </div>
  <div class="hud tr" id="status">INITIALISING</div>
  <div class="hud bl" id="coords"></div>

  <!-- Data layer pills -->
  <div id="layer-indicator">
    <div class="layer-pill active" id="pill-sat"><div class="layer-dot"></div>SATELLITE IMAGERY</div>
    <div class="layer-pill" id="pill-terrain"><div class="layer-dot"></div>WORLD TERRAIN</div>
    <div class="layer-pill" id="pill-buildings"><div class="layer-dot"></div>OSM BUILDINGS</div>
  </div>

  <!-- Left altitude bar -->
  <div id="alt-bar"><div id="alt-fill"></div></div>

  <!-- Scroll hint -->
  <div id="scroll-hint">SCROLL TO NAVIGATE<div class="scroll-arrow"></div></div>

  <!-- Loading screen -->
  <div id="loading">
    <div class="dn-logo">DIGITAL <span>NATIONS</span></div>
    <div class="loading-bar"><div class="loading-fill" id="load-fill"></div></div>
    <div class="loading-status" id="load-status">CONNECTING TO ION</div>
  </div>

  <script>
    // ─── Cesium Ion token (Amer Tarawneh / Digital Nations) ───────────────────
    const ION_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4MGQwNzFjYS02MDU0LTQ0MTgtODliOS1lMzM1ODNkYWM2MjEiLCJpZCI6NDQ5NTI4LCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODI1MDExNjF9.o4U8guur551PlsoT86kOlxnmFHd9YE_cIprYgwpB8-s';

    const $ = (id) => document.getElementById(id);
    const setStatus = (t) => { const el = $('status'); if (el) el.textContent = t; };
    const setLoad  = (pct, msg) => {
      const f = $('load-fill'); const s = $('load-status');
      if (f) f.style.width = pct + '%';
      if (s) s.textContent = msg;
    };

    // ─── Layer altitude thresholds (metres) ────────────────────────────────────
    // Space   : > 3 000 km  — globe from orbit, imagery only
    // Regional: 80 km – 3 000 km — terrain + imagery visible
    // Terrain :  < 80 km  — terrain fine detail + OSM buildings
    const SPACE_ALT    = 3_000_000;
    const TERRAIN_ALT  =    80_000;

    let osmBuildings = null;
    let currentMode  = 'SPACE';

    async function boot() {
      Cesium.Ion.defaultAccessToken = ION_TOKEN;
      setLoad(20, 'STREAMING TERRAIN');

      const terrain = await Cesium.createWorldTerrainAsync({
        requestWaterMask: true,
        requestVertexNormals: true,
      });
      setLoad(50, 'BUILDING VIEWER');

      const viewer = new Cesium.Viewer('cesiumContainer', {
        terrainProvider:       terrain,
        sceneMode:             Cesium.SceneMode.SCENE3D,   // full globe
        baseLayerPicker:       false,
        geocoder:              false,
        homeButton:            false,
        sceneModePicker:       false,
        navigationHelpButton:  false,
        animation:             false,
        timeline:              false,
        fullscreenButton:      false,
        infoBox:               false,
        selectionIndicator:    false,
        requestRenderMode:     false,
        msaaSamples:           4,
      });

      const scene  = viewer.scene;
      const camera = viewer.camera;
      const globe  = scene.globe;

      // ─── Scene quality ────────────────────────────────────────────────────
      globe.enableLighting         = true;
      globe.depthTestAgainstTerrain= true;
      globe.atmosphereLightIntensity = 10.0;
      globe.nightFadeOutDistance   = 4_000_000;
      globe.nightFadeInDistance    = 6_000_000;
      scene.skyAtmosphere.show     = true;
      scene.skyAtmosphere.atmosphereLightIntensity = 15.0;
      scene.skyBox.show            = true;
      scene.fog.enabled            = true;
      scene.fog.density            = 0.0002;
      scene.highDynamicRange       = true;
      scene.msaaSamples            = 4;

      // Dusk over the Levant — ocean glints, terrain shadows rake
      viewer.clock.currentTime  = Cesium.JulianDate.fromIso8601('2026-06-26T14:45:00Z');
      viewer.clock.shouldAnimate = true;

      setLoad(70, 'LOADING BUILDINGS');

      // OSM buildings load now but won't be SHOWN until altitude < TERRAIN_ALT
      try {
        osmBuildings = await Cesium.createOsmBuildingsAsync();
        osmBuildings.show = false;       // hidden until user zooms in
        scene.primitives.add(osmBuildings);
      } catch (_) { /* buildings optional */ }

      setLoad(90, 'CALIBRATING ORBIT');

      // ─── Starting position: orbit over Earth (space view) ─────────────────
      camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(36.0, 30.0, 12_000_000),
        orientation: {
          heading: Cesium.Math.toRadians(0),
          pitch:   Cesium.Math.toRadians(-90),
          roll:    0,
        },
        duration: 0,
      });

      setLoad(100, 'LIVE');
      setTimeout(() => {
        const el = $('loading');
        if (el) el.classList.add('gone');
        setTimeout(() => { if (el) el.remove(); }, 900);
      }, 400);

      // ─── Smooth scroll → altitude control ─────────────────────────────────
      // We override the default Cesium wheel handler so we can add layer transitions.
      let targetAlt = 12_000_000;
      let animFrameId = null;

      function lerp(a, b, t) { return a + (b - a) * t; }

      // Wheel event: adjust target altitude, then animate camera to it
      window.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 1 : -1;
        // Exponential zoom: multiply by a factor based on current altitude
        const factor = delta > 0 ? 0.85 : 1.18;
        targetAlt = Math.min(Math.max(targetAlt * factor, 100), 15_000_000);
        scheduleFly();
      }, { passive: false });

      function scheduleFly() {
        if (animFrameId) return;
        animFrameId = requestAnimationFrame(doFly);
      }

      function doFly() {
        animFrameId = null;
        const pos   = camera.positionCartographic;
        const curAlt = pos.height;
        const diff  = Math.abs(targetAlt - curAlt);
        if (diff < 500) return;
        // Keep lat/lon, just change altitude
        camera.flyTo({
          destination: Cesium.Cartesian3.fromRadians(pos.longitude, pos.latitude, targetAlt),
          orientation: camera.heading != null ? {
            heading: camera.heading,
            pitch:   Cesium.Math.toRadians(-90),
            roll:    0,
          } : undefined,
          duration: 0.45,
          easingFunction: Cesium.EasingFunction.QUADRATIC_OUT,
        });
        setTimeout(() => scheduleFly(), 500);
      }

      // ─── Layer transition: update HUD + toggle data layers by altitude ─────
      function updateLayers() {
        const alt   = camera.positionCartographic.height;
        const maxAlt = 15_000_000;

        // Altitude progress bar (0 = top of screen = far, bottom = close)
        const frac = 1 - Math.log10(Math.max(alt, 100)) / Math.log10(maxAlt);
        $('alt-fill').style.height = Math.min(Math.max(frac * 100, 2), 98) + '%';

        // Layer pills
        const inSpace   = alt > SPACE_ALT;
        const inTerrain = alt < TERRAIN_ALT;

        $('pill-sat').classList.toggle('active', true);              // always on
        $('pill-terrain').classList.toggle('active', !inSpace);      // appears at < 3000 km
        $('pill-buildings').classList.toggle('active', inTerrain);   // appears at < 80 km

        // OSM buildings visibility
        if (osmBuildings) osmBuildings.show = inTerrain;

        // Mode label + status
        let mode, label;
        if (inSpace) {
          mode  = 'SPACE';
          label = 'SPACE VIEW';
          setStatus('ORBITAL SCAN');
        } else if (!inTerrain) {
          mode  = 'REGIONAL';
          label = 'REGIONAL VIEW';
          setStatus('TERRAIN STREAMING');
        } else {
          mode  = 'TERRAIN';
          label = 'GROUND LEVEL';
          setStatus('BUILDINGS LIVE');
        }

        if (mode !== currentMode) {
          currentMode = mode;
          $('mode-label').textContent = label;
        }

        // Coordinates HUD (only when zoomed in)
        if (!inSpace) {
          const pos = camera.positionCartographic;
          const lat = Cesium.Math.toDegrees(pos.latitude).toFixed(3);
          const lon = Cesium.Math.toDegrees(pos.longitude).toFixed(3);
          const km  = (alt / 1000).toFixed(0);
          $('coords').textContent = `${lat}° N  ${lon}° E  ALT ${km} km`;
        } else {
          $('coords').textContent = '';
        }
      }

      // Hook into Cesium's post-render to update HUD every frame
      scene.postRender.addEventListener(updateLayers);
    }

    boot().catch(err => {
      console.error(err);
      $('load-status').textContent = 'FAILED: ' + (err.message || err);
    });
  </script>
</body>
</html>
